# goreleaser config for the axilio CLI (schema v2).
# Local check:   goreleaser check
# Dry-run build: goreleaser release --snapshot --clean
# Real release:  git tag v0.1.0 && git push origin v0.1.0  (Release workflow runs this)
version: 2

project_name: axilio

before:
  hooks:
    - go mod tidy

builds:
  - id: axilio
    main: ./cmd/axilio
    binary: axilio
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/axilioai/cli/cmd.Version={{ .Version }}
      - -X github.com/axilioai/cli/cmd.Commit={{ .FullCommit }}
      - -X github.com/axilioai/cli/cmd.Date={{ .Date }}

archives:
  - id: axilio
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto

# Homebrew tap (macOS). Publishes the axilio cask to axilioai/homebrew-tap on
# each non-prerelease tag — goreleaser deprecated formula `brews` in favor of
# casks. Requires the tap repo to exist and a HOMEBREW_TAP_TOKEN secret (PAT with
# contents:write on the tap) set on this repo. skip_upload: auto skips the push
# for prereleases (e.g. v0.1.0-rc1), so an -rc tag validates the pipeline without
# needing the token. Linux users install via `go install` / the curl script.
homebrew_casks:
  - name: axilio
    binaries:
      - axilio
    repository:
      owner: axilioai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://axilio.ai"
    description: "Acquire and drive Axilio phones from the command line."
    commit_author:
      name: axilio-bot
      email: bot@axilio.ai
    skip_upload: auto
    # The release binary is unsigned; strip the macOS quarantine attribute so it
    # runs without a Gatekeeper prompt on first launch.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/axilio"]
          end
